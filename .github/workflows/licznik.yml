name: licznik
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python scraper.py
      - run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add dane.json historia.csv
          git diff --staged --quiet || git commit -m "aktualizacja"
          git push
